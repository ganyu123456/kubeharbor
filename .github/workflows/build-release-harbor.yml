name: 构建和发布 Harbor 离线安装包

# ── 触发条件 ────────────────────────────────────────────────────────────────
# 1. 推送 harbor-v* 格式的 tag（如 harbor-v2.13.0）→ 自动构建发布
# 2. 手动触发（workflow_dispatch）→ 可指定版本和 arm64 镜像来源
#
# ── 目录结构说明 ──────────────────────────────────────────────────────────────
# amd64/install.sh           → 注入到官方离线包的自定义一键部署脚本
# arm64/                     → ARM64 完整自维护包（脚本 + 配置 + 镜像）
#   ├── install.sh           → 一键部署脚本（完全离线）
#   ├── harbor.yml.tmpl      → Harbor 配置模板
#   ├── common.sh
#   ├── prepare              → Harbor prepare 二进制（aarch64）
#   └── LICENSE
#
# ── arm64 Harbor 镜像预上传步骤（一次性操作）────────────────────────────────
#   1. GitHub 仓库 → Releases → Create a new release
#   2. tag: harbor-arm64-base，title: Harbor ARM64 Base Images
#   3. 上传 harbor.v2.13.0.tar.gz 作为附件
#   4. 发布（可选 pre-release）
# ────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'harbor-v*'
  workflow_dispatch:
    inputs:
      harbor_version:
        description: 'Harbor 版本号（如 v2.13.0）'
        required: true
        default: 'v2.13.0'
      arm64_base_tag:
        description: 'arm64 镜像所在的 Release tag（默认 harbor-arm64-base）'
        required: false
        default: 'harbor-arm64-base'

permissions:
  contents: write

# ── 公共环境变量 ──────────────────────────────────────────────────────────────
env:
  DEFAULT_ARM64_BASE_TAG: 'harbor-arm64-base'
  # Docker 静态包版本（用于 arm64 完全离线安装）
  DOCKER_VERSION: '27.5.1'
  DOCKER_COMPOSE_VERSION: 'v2.33.1'

jobs:
  # ============================================================
  # Job 1: 构建 amd64 包（下载官方完整离线安装包 + 注入脚本）
  # ============================================================
  build-amd64:
    runs-on: ubuntu-latest
    name: 构建 amd64 离线包
    outputs:
      tag_version: ${{ steps.set_env.outputs.tag_version }}
      harbor_version: ${{ steps.set_env.outputs.harbor_version }}
      package_name: ${{ steps.set_env.outputs.package_name }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置环境变量
        id: set_env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            HARBOR_VERSION="${{ github.event.inputs.harbor_version }}"
            TAG_VERSION="manual-harbor-${GITHUB_SHA::7}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
            HARBOR_VERSION="${TAG_VERSION#harbor-}"
          fi
          PACKAGE_NAME="harbor-offline-${HARBOR_VERSION}-amd64.tar.gz"

          echo "HARBOR_VERSION=${HARBOR_VERSION}"   >> $GITHUB_ENV
          echo "TAG_VERSION=${TAG_VERSION}"         >> $GITHUB_ENV
          echo "PACKAGE_NAME=${PACKAGE_NAME}"       >> $GITHUB_ENV
          echo "harbor_version=${HARBOR_VERSION}"   >> $GITHUB_OUTPUT
          echo "tag_version=${TAG_VERSION}"         >> $GITHUB_OUTPUT
          echo "package_name=${PACKAGE_NAME}"       >> $GITHUB_OUTPUT

      # ── Step 1: 下载官方 amd64 离线安装包 ────────────────────
      - name: 下载 Harbor amd64 官方离线安装包
        run: |
          set -euo pipefail
          OFFICIAL_PKG="harbor-offline-installer-${HARBOR_VERSION}.tgz"
          DOWNLOAD_URL="https://github.com/goharbor/harbor/releases/download/${HARBOR_VERSION}/${OFFICIAL_PKG}"

          echo "=== 下载 Harbor amd64 官方离线包 ==="
          echo "版本  : ${HARBOR_VERSION}"
          echo "URL   : ${DOWNLOAD_URL}"

          wget --progress=dot:giga -O "${OFFICIAL_PKG}" "${DOWNLOAD_URL}" \
            || { echo "❌ 下载失败: ${DOWNLOAD_URL}"; exit 1; }

          echo "✓ 下载完成: $(du -h ${OFFICIAL_PKG} | cut -f1)"

          # 解压到独立临时目录
          mkdir -p /tmp/harbor-official
          tar -xzf "${OFFICIAL_PKG}" -C /tmp/harbor-official
          echo "✓ 解包完成"
          ls -lh /tmp/harbor-official/harbor/

      # ── Step 2: 注入自定义 install.sh ────────────────────────
      - name: 注入 install.sh
        run: |
          set -euo pipefail
          INSTALL_SCRIPT="${GITHUB_WORKSPACE}/amd64/install.sh"
          [ -f "$INSTALL_SCRIPT" ] || { echo "❌ 找不到 amd64/install.sh"; exit 1; }

          cp "$INSTALL_SCRIPT" /tmp/harbor-official/harbor/install.sh
          chmod +x /tmp/harbor-official/harbor/install.sh
          echo "✓ install.sh 注入完成"

          # 确保 harbor.yml.tmpl 存在（官方包已包含，若无则从 arm64/ 复制）
          if [ ! -f /tmp/harbor-official/harbor/harbor.yml.tmpl ]; then
            if [ -f "${GITHUB_WORKSPACE}/arm64/harbor.yml.tmpl" ]; then
              cp "${GITHUB_WORKSPACE}/arm64/harbor.yml.tmpl" /tmp/harbor-official/harbor/harbor.yml.tmpl
              echo "✓ harbor.yml.tmpl 已从 arm64/ 补充"
            else
              echo "⚠️  未找到 harbor.yml.tmpl（官方包可能已内置，忽略）"
            fi
          else
            echo "✓ harbor.yml.tmpl 已存在于官方包中"
          fi

      # ── Step 2.5: 下载 Docker 静态包（x86_64，用于完全离线安装）
      - name: 下载 Docker 和 Docker Compose 离线包（x86_64）
        run: |
          set -euo pipefail
          OFFLINE_DIR="/tmp/harbor-official/harbor/offline"
          mkdir -p "$OFFLINE_DIR"

          # Docker 静态二进制包（x86_64）
          DOCKER_TGZ="docker-${DOCKER_VERSION}.tgz"
          DOCKER_URL="https://download.docker.com/linux/static/stable/x86_64/${DOCKER_TGZ}"
          echo "=== 下载 Docker ${DOCKER_VERSION} x86_64 静态包 ==="
          echo "URL: ${DOCKER_URL}"
          wget --progress=dot:giga -O "${OFFLINE_DIR}/${DOCKER_TGZ}" "${DOCKER_URL}" \
            || { echo "❌ 下载 Docker 静态包失败"; exit 1; }
          echo "✓ docker: $(du -h ${OFFLINE_DIR}/${DOCKER_TGZ} | cut -f1)"

          # Docker Compose 二进制（linux/amd64）
          COMPOSE_URL="https://github.com/docker/compose/releases/download/${DOCKER_COMPOSE_VERSION}/docker-compose-linux-x86_64"
          echo "=== 下载 Docker Compose ${DOCKER_COMPOSE_VERSION} linux/amd64 ==="
          echo "URL: ${COMPOSE_URL}"
          wget --progress=dot:giga -O "${OFFLINE_DIR}/docker-compose" "${COMPOSE_URL}" \
            || { echo "❌ 下载 Docker Compose 失败"; exit 1; }
          chmod +x "${OFFLINE_DIR}/docker-compose"
          echo "✓ docker-compose: $(du -h ${OFFLINE_DIR}/docker-compose | cut -f1)"

          echo ""
          echo "✓ 离线工具包内容:"
          ls -lh "${OFFLINE_DIR}/"

      # ── Step 3: 生成说明文件 ─────────────────────────────────
      - name: 生成说明文件
        run: |
          mkdir -p /tmp/harbor-official/harbor/meta
          cat > /tmp/harbor-official/harbor/meta/version.txt << EOF
          harbor_version=${HARBOR_VERSION}
          arch=amd64
          image_source=official
          docker_version=${DOCKER_VERSION}
          docker_compose_version=${DOCKER_COMPOSE_VERSION}
          build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          tag=${TAG_VERSION}
          EOF

          cat > /tmp/harbor-official/harbor/README.txt << EOF
          Harbor 离线安装包 ${HARBOR_VERSION} (amd64)
          =============================================
          镜像来源 : Harbor 官方（标准 v2.x 镜像标签）
          架构     : amd64 (x86_64)
          构建时间 : $(date -u +%Y-%m-%dT%H:%M:%SZ)

          快速部署（一键，完全离线，无需联网）:
            tar -xzf harbor-offline-${HARBOR_VERSION}-amd64.tar.gz && cd harbor
            sudo bash install.sh                          # 自动检测 IP，HTTPS 443
            sudo bash install.sh 192.168.1.100 8443       # 指定 IP 和端口
            sudo bash install.sh --domain harbor.local    # 使用域名

          说明:
            - Docker ${DOCKER_VERSION} 和 Docker Compose ${DOCKER_COMPOSE_VERSION} 已内置，自动安装
            - Harbor 镜像已内置，完全无需联网
            - 自动签发自签名 TLS 证书，直接启用 HTTPS
            - 支持: Ubuntu 20.04+ / Debian 11+ / CentOS 7+ / RHEL 8+

          默认账号: admin / Harbor12345（首次登录后请修改）
          EOF
          echo "✓ 说明文件已生成"

      # ── Step 4: 打包并生成校验和 ─────────────────────────────
      - name: 打包
        run: |
          set -euo pipefail
          tar -czf "${PACKAGE_NAME}" -C /tmp/harbor-official harbor/
          sha256sum "${PACKAGE_NAME}" > "${PACKAGE_NAME}.sha256sum.txt"
          echo "✓ 打包完成: ${PACKAGE_NAME} ($(du -h ${PACKAGE_NAME} | cut -f1))"
          echo "  SHA256: $(cat ${PACKAGE_NAME}.sha256sum.txt)"

      # ── Step 5: 上传构建产物 ──────────────────────────────────
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: harbor-amd64
          path: |
            ${{ env.PACKAGE_NAME }}
            ${{ env.PACKAGE_NAME }}.sha256sum.txt
          retention-days: 1

  # ============================================================
  # Job 2: 构建 arm64 包（Harbor 镜像从 Release 下载 + 离线 Docker 包）
  # ============================================================
  build-arm64:
    runs-on: ubuntu-latest
    name: 构建 arm64 离线包
    outputs:
      package_name: ${{ steps.set_env.outputs.package_name }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置环境变量
        id: set_env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            HARBOR_VERSION="${{ github.event.inputs.harbor_version }}"
            TAG_VERSION="manual-harbor-${GITHUB_SHA::7}"
            ARM64_BASE_TAG="${{ github.event.inputs.arm64_base_tag }}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
            HARBOR_VERSION="${TAG_VERSION#harbor-}"
            ARM64_BASE_TAG="${DEFAULT_ARM64_BASE_TAG}"
          fi
          PACKAGE_NAME="harbor-offline-${HARBOR_VERSION}-arm64.tar.gz"
          ARM64_IMAGE_FILE="harbor.${HARBOR_VERSION}.tar.gz"

          echo "HARBOR_VERSION=${HARBOR_VERSION}"         >> $GITHUB_ENV
          echo "TAG_VERSION=${TAG_VERSION}"               >> $GITHUB_ENV
          echo "ARM64_BASE_TAG=${ARM64_BASE_TAG}"         >> $GITHUB_ENV
          echo "ARM64_IMAGE_FILE=${ARM64_IMAGE_FILE}"     >> $GITHUB_ENV
          echo "PACKAGE_NAME=${PACKAGE_NAME}"             >> $GITHUB_ENV
          echo "harbor_version=${HARBOR_VERSION}"         >> $GITHUB_OUTPUT
          echo "tag_version=${TAG_VERSION}"               >> $GITHUB_OUTPUT
          echo "package_name=${PACKAGE_NAME}"             >> $GITHUB_OUTPUT

      # ── Step 1: 从本仓库 Release 下载 arm64 Harbor 镜像包 ────
      - name: 下载 arm64 Harbor 镜像包
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${ARM64_BASE_TAG}/${ARM64_IMAGE_FILE}"

          echo "=== 下载 arm64 Harbor 镜像包 ==="
          echo "Release tag : ${ARM64_BASE_TAG}"
          echo "文件名      : ${ARM64_IMAGE_FILE}"
          echo "URL         : ${DOWNLOAD_URL}"

          wget --progress=dot:giga \
               --header="Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -O "${ARM64_IMAGE_FILE}" \
               "${DOWNLOAD_URL}" \
            || {
              echo ""
              echo "❌ 下载失败！请确认已将 arm64 镜像包上传到 Release:"
              echo "   1. 在 GitHub 仓库 → Releases → Create release"
              echo "   2. tag: ${ARM64_BASE_TAG}"
              echo "   3. 上传文件: harbor.${HARBOR_VERSION}.tar.gz"
              exit 1
            }

          echo "✓ 下载完成: $(du -h ${ARM64_IMAGE_FILE} | cut -f1)"

      # ── Step 2: 下载 Docker 静态包（aarch64，用于完全离线安装）
      - name: 下载 Docker 和 Docker Compose 离线包（aarch64）
        run: |
          set -euo pipefail
          OFFLINE_DIR="/tmp/harbor-arm64/harbor/offline"
          mkdir -p "$OFFLINE_DIR"

          # Docker 静态二进制包（aarch64）
          DOCKER_TGZ="docker-${DOCKER_VERSION}.tgz"
          DOCKER_URL="https://download.docker.com/linux/static/stable/aarch64/${DOCKER_TGZ}"
          echo "=== 下载 Docker ${DOCKER_VERSION} aarch64 静态包 ==="
          echo "URL: ${DOCKER_URL}"
          wget --progress=dot:giga -O "${OFFLINE_DIR}/${DOCKER_TGZ}" "${DOCKER_URL}" \
            || { echo "❌ 下载 Docker 静态包失败"; exit 1; }
          echo "✓ docker: $(du -h ${OFFLINE_DIR}/${DOCKER_TGZ} | cut -f1)"

          # Docker Compose 二进制（linux/arm64）
          COMPOSE_URL="https://github.com/docker/compose/releases/download/${DOCKER_COMPOSE_VERSION}/docker-compose-linux-aarch64"
          echo "=== 下载 Docker Compose ${DOCKER_COMPOSE_VERSION} linux/arm64 ==="
          echo "URL: ${COMPOSE_URL}"
          wget --progress=dot:giga -O "${OFFLINE_DIR}/docker-compose" "${COMPOSE_URL}" \
            || { echo "❌ 下载 Docker Compose 失败"; exit 1; }
          chmod +x "${OFFLINE_DIR}/docker-compose"
          echo "✓ docker-compose: $(du -h ${OFFLINE_DIR}/docker-compose | cut -f1)"

          echo ""
          echo "✓ 离线工具包内容:"
          ls -lh "${OFFLINE_DIR}/"

      # ── Step 3: 组装 arm64 安装包目录结构 ────────────────────
      - name: 组装安装包
        run: |
          set -euo pipefail
          echo "=== 组装 arm64 安装包 ==="
          mkdir -p /tmp/harbor-arm64/harbor

          # 从仓库 arm64/ 目录复制脚本和配置文件
          REPO_ARM64="${GITHUB_WORKSPACE}/arm64"
          for f in install.sh common.sh prepare harbor.yml.tmpl LICENSE; do
            if [ -f "${REPO_ARM64}/${f}" ]; then
              cp "${REPO_ARM64}/${f}" /tmp/harbor-arm64/harbor/
              echo "  ✓ 复制: arm64/${f}"
            else
              echo "  ⚠️  未找到: arm64/${f}（跳过）"
            fi
          done
          chmod +x /tmp/harbor-arm64/harbor/install.sh 2>/dev/null || true
          chmod +x /tmp/harbor-arm64/harbor/prepare     2>/dev/null || true

          # 将 Harbor 镜像包放入目录
          cp "${ARM64_IMAGE_FILE}" /tmp/harbor-arm64/harbor/
          echo "  ✓ 复制: ${ARM64_IMAGE_FILE}"

          echo ""
          echo "✓ 组装完成，包含文件:"
          ls -lh /tmp/harbor-arm64/harbor/
          echo ""
          echo "  offline/ 目录:"
          ls -lh /tmp/harbor-arm64/harbor/offline/

      # ── Step 4: 生成说明文件 ─────────────────────────────────
      - name: 生成说明文件
        run: |
          mkdir -p /tmp/harbor-arm64/harbor/meta
          cat > /tmp/harbor-arm64/harbor/meta/version.txt << EOF
          harbor_version=${HARBOR_VERSION}
          arch=arm64
          image_source=custom-aarch64
          image_file=${ARM64_IMAGE_FILE}
          docker_version=${DOCKER_VERSION}
          docker_compose_version=${DOCKER_COMPOSE_VERSION}
          build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          tag=${TAG_VERSION}
          EOF

          cat > /tmp/harbor-arm64/harbor/README.txt << EOF
          Harbor 离线安装包 ${HARBOR_VERSION} (arm64)
          =============================================
          镜像来源 : 自定义 aarch64 镜像（标签含 -aarch64 后缀）
          架构     : arm64 (aarch64)
          构建时间 : $(date -u +%Y-%m-%dT%H:%M:%SZ)

          快速部署（一键，完全离线，无需联网）:
            tar -xzf harbor-offline-${HARBOR_VERSION}-arm64.tar.gz && cd harbor
            sudo bash install.sh                          # 自动检测 IP，HTTPS 443
            sudo bash install.sh 192.168.1.100 8443       # 指定 IP 和端口
            sudo bash install.sh --domain harbor.local    # 使用域名

          说明:
            - Docker ${DOCKER_VERSION} 和 Docker Compose ${DOCKER_COMPOSE_VERSION} 已内置，自动安装
            - Harbor 镜像已内置，完全无需联网
            - 自动签发自签名 TLS 证书，直接启用 HTTPS
            - 支持: Ubuntu 20.04+ / Debian 11+ / 麒麟 / openEuler 等 arm64 Linux

          默认账号: admin / Harbor12345（首次登录后请修改）
          注意: 此包使用自定义 aarch64 镜像，镜像标签含 -aarch64 后缀。
          EOF
          echo "✓ 说明文件已生成"

      # ── Step 5: 打包并生成校验和 ─────────────────────────────
      - name: 打包
        run: |
          set -euo pipefail
          tar -czf "${PACKAGE_NAME}" -C /tmp/harbor-arm64 harbor/
          sha256sum "${PACKAGE_NAME}" > "${PACKAGE_NAME}.sha256sum.txt"
          echo "✓ 打包完成: ${PACKAGE_NAME} ($(du -h ${PACKAGE_NAME} | cut -f1))"
          echo "  SHA256: $(cat ${PACKAGE_NAME}.sha256sum.txt)"

      # ── Step 6: 上传构建产物 ──────────────────────────────────
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: harbor-arm64
          path: |
            ${{ env.PACKAGE_NAME }}
            ${{ env.PACKAGE_NAME }}.sha256sum.txt
          retention-days: 1

  # ============================================================
  # Job 3: 发布到 GitHub Release（等待两个 arch 都构建完成）
  # ============================================================
  release:
    runs-on: ubuntu-latest
    name: 发布到 GitHub Release
    needs: [build-amd64, build-arm64]

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-files/

      - name: 整理发布文件
        run: |
          echo "=== 准备发布文件 ==="
          find release-files/ -type f | sort
          mkdir -p dist
          find release-files/ -type f -exec cp {} dist/ \;
          ls -lh dist/

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build-amd64.outputs.tag_version }}
          name: "Harbor 离线包 ${{ needs.build-amd64.outputs.harbor_version }}"
          body: |
            ## Harbor 离线安装包 ${{ needs.build-amd64.outputs.harbor_version }}

            ### 下载
            | 架构 | 文件 | 说明 |
            |------|------|------|
            | amd64 (x86_64) | `harbor-offline-${{ needs.build-amd64.outputs.harbor_version }}-amd64.tar.gz` | 官方标准镜像，**完全离线**（含 Docker ${{ env.DOCKER_VERSION }}）|
            | arm64 (aarch64) | `harbor-offline-${{ needs.build-amd64.outputs.harbor_version }}-arm64.tar.gz` | 自定义 aarch64 镜像，**完全离线**（含 Docker ${{ env.DOCKER_VERSION }}）|

            ### 快速安装

            #### amd64（完全离线，Docker 已内置无需联网）
            ```bash
            tar -xzf harbor-offline-${{ needs.build-amd64.outputs.harbor_version }}-amd64.tar.gz
            cd harbor/
            sudo bash install.sh                          # 自动检测 IP，HTTPS 443
            sudo bash install.sh 192.168.1.100 8443       # 指定 IP 和端口
            ```

            #### arm64（完全离线，Docker 已内置无需联网）
            ```bash
            tar -xzf harbor-offline-${{ needs.build-amd64.outputs.harbor_version }}-arm64.tar.gz
            cd harbor/
            sudo bash install.sh                          # 自动检测 IP，HTTPS 443
            sudo bash install.sh 192.168.1.100 8443       # 指定 IP 和端口
            ```

            ### 功能特性
            - ✅ 一键部署，自动签发自签名 TLS 证书，直接启用 HTTPS
            - ✅ **amd64 和 arm64 均完全离线**，Docker ${{ env.DOCKER_VERSION }} + Compose ${{ env.DOCKER_COMPOSE_VERSION }} 已内置
            - ✅ 客户只需一台裸 Linux，解压 → `sudo bash install.sh` 即可完成部署
            - ✅ 支持 IP 或域名，SAN 证书自动匹配

            ### 包含内容
            - Harbor 离线镜像包（`harbor.v*.tar.gz`）
            - 一键部署脚本 `install.sh`（自动安装 Docker / 证书 / 配置 / 启动）
            - `offline/` 目录：Docker 静态包 + Docker Compose 二进制（完全离线）

            ### 前置要求
            - root 权限
            - 无需联网（两个架构均完全离线）
          files: dist/*
          generate_release_notes: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
